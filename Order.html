<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Now-AL-MADINA BOOK SHOP</title>
  <style>
    .navbar { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      background-color: darkgreen; 
      padding: 10px 15px; 
    }

    .nav-logo { 
      display: flex;
      align-items: center;
      gap: 5px;
      color: white; 
      font-size: 14px; 
      font-weight: bold;
    }

    .nav-links { display: flex; gap: 5px; }
    .nav-links a { color: white; text-decoration: none; font-size: 14px; }
    .nav-links a:hover { color: lightgreen; }

    .form-section {
      padding: 30px 15px;
      background-color: #f9f9f9;
      max-width: 400px;
      margin: 20px auto;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .form-section h2 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      color: #555;
    }

    .form-group input, .form-group textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }

    .submit-btn {
      width: 100%;
      background-color: darkgreen;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    .submit-btn:hover {
      background-color: #004d00;
    }
  </style>
</head>

<body>
  <nav class="navbar">
    <div class="nav-logo">
      <img src="logo.png" alt="Logo" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;">
      AL-MADINA BOOK SHOP
    </div>
<div class="nav-links">
  <a href="index.html">Home</a>
  <a href="Books.html">Books</a>
  <a href="Order.html">Order Now</a>
  <a href="Contact.html">Contact</a>
</div>
  </nav>

  <div class="form-section">
    <h2>Book Your Order</h2>
    <form>
      <div class="form-group">
        <label>Your Name:</label>
        <input type="text" placeholder="Enter your name"required>
      </div>

      <div class="form-group">
        <label>Your Email:</label>
        <input type="email" placeholder="Enter your email"required>
      </div>

      <div class="form-group">
        <label>City:</label>
        <input type="text" placeholder="Enter your city"required>
      </div>

      <div class="form-group">
        <label>Address:</label>
        <input type="text" placeholder="Enter your complete address"required>
      </div>

      <div class="form-group">
        <label>Message:</label>
        <textarea rows="4" placeholder="Write your message here..."></textarea>
      </div>
<div class="form-group">
        <h3 id="order-bill">Your Total Bill: Rs. 0</h3>
      </div>
      <button type="submit" class="submit-btn">Place Order</button>
    </form>
  </div>
  <script src="order-script.js"></script>
</body>

</html>
